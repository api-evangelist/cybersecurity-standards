  - aid: cybersecurity-standards:pci-dss
    name: PCI DSS Payment Card Industry Data Security Standard
    description: >-
      PCI DSS, maintained by the PCI Security Standards Council,
      defines requirements for organizations that store, process, or
      transmit cardholder data. Version 4.0.1 is the current edition.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg

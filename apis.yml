        url: https://csrc.nist.gov/publications/detail/sp/800-218/final
  - aid: cybersecurity-standards:iso-27001
    name: ISO/IEC 27001 Information Security Management
    description: >-
      ISO/IEC 27001 is the international standard for information
      security management systems (ISMS). The 2022 revision aligns
      Annex A controls with the ISO/IEC 27002:2022 catalog.
      Certification is performed by accredited bodies.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.iso.org/standard/27001
    tags:

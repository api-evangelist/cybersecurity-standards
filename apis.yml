    name: SOC 2 Trust Services Criteria
    description: >-
      SOC 2 (System and Organization Controls 2) reports are issued
      by AICPA-licensed auditors against the Trust Services Criteria
      (Security, Availability, Processing Integrity, Confidentiality,
      Privacy). Widely adopted by SaaS vendors.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg

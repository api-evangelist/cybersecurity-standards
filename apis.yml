aid: cybersecurity-standards
name: Cybersecurity Standards
kind: topic
description: >-
  Cybersecurity Standards captures the public, machine-readable, and
  reference frameworks that establish best practices for protecting
  information systems, networks, software, and data from cyber threats.
  The landscape is anchored by U.S. National Institute of Standards
  and Technology (NIST) publications such as the Cybersecurity
  Framework (CSF) 2.0, SP 800-53 controls, SP 800-171 controls for
  controlled unclassified information, the Risk Management Framework
  (RMF), and the Secure Software Development Framework (SSDF SP
  800-218); the international ISO/IEC 27001 / 27002 information
  security management standard family; the Center for Internet
  Security (CIS) Critical Security Controls and Benchmarks; the OWASP
  Top 10 and ASVS for application security; PCI DSS for payment data;
  HITRUST CSF for healthcare; SOC 2 trust services criteria; and
  FedRAMP / StateRAMP for cloud authorization. This index aggregates
  authoritative URLs, machine-readable artifacts (e.g., OSCAL), and
  cross-references for organizations building or auditing
  cybersecurity programs.

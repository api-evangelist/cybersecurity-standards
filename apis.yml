apis:
  - aid: cybersecurity-standards:nist-csf
    name: NIST Cybersecurity Framework (CSF) 2.0
    description: >-
      The NIST Cybersecurity Framework 2.0 is a voluntary risk-based
      framework organizing cybersecurity activities into six core
      functions (Govern, Identify, Protect, Detect, Respond, Recover)
      with categories and subcategories. NIST publishes informative
      references and quick-start guides mapping CSF to other standards.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.nist.gov/cyberframework
    tags:
      - CSF
      - Framework
      - NIST
      - Risk Management
    properties:
      - type: Documentation
        url: https://www.nist.gov/cyberframework
      - type: Publication
        url: https://doi.org/10.6028/NIST.CSWP.29
      - type: QuickStartGuides
        url: https://www.nist.gov/cyberframework/quick-start-guides
      - type: InformativeReferences
        url: https://www.nist.gov/cyberframework/informative-references
  - aid: cybersecurity-standards:nist-800-53
    name: NIST SP 800-53 Security and Privacy Controls
    description: >-
      NIST Special Publication 800-53 Revision 5 catalogs security
      and privacy controls for information systems and organizations.
      Used as the basis of FedRAMP authorizations and Risk Management
      Framework implementations. Available in machine-readable OSCAL
      format.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final
    tags:
      - Controls
      - FedRAMP
      - NIST
      - OSCAL
      - RMF
    properties:
      - type: Documentation
        url: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final
      - type: OSCALContent
        url: https://github.com/usnistgov/oscal-content
      - type: ControlBaselines
        url: https://csrc.nist.gov/Projects/risk-management/sp800-53-controls/release-search
  - aid: cybersecurity-standards:nist-800-171
    name: NIST SP 800-171 Protecting CUI
    description: >-
      NIST SP 800-171 specifies requirements for protecting Controlled
      Unclassified Information (CUI) in non-federal systems. Forms
      the basis of CMMC (Cybersecurity Maturity Model Certification)
      for the U.S. defense industrial base.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://csrc.nist.gov/publications/detail/sp/800-171/rev-3/final
    tags:
      - CMMC
      - CUI
      - DIB
      - NIST
    properties:
      - type: Documentation
        url: https://csrc.nist.gov/publications/detail/sp/800-171/rev-3/final
      - type: Assessment
        url: https://csrc.nist.gov/publications/detail/sp/800-171a/rev-3/final
  - aid: cybersecurity-standards:nist-ssdf
    name: NIST SP 800-218 Secure Software Development Framework (SSDF)
    description: >-
      NIST SP 800-218 defines the Secure Software Development Framework
      (SSDF), a set of high-level secure-development practices
      referenced by U.S. Executive Order 14028 and procurement
      attestations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://csrc.nist.gov/publications/detail/sp/800-218/final
    tags:

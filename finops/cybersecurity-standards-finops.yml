    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Cybersecurity Standards
  ServiceCategory: Developer Tools / API
  ProviderName: Cybersecurity Standards
  PublisherName: Cybersecurity Standards

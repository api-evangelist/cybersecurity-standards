specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Cybersecurity Standards
providerId: cybersecurity-standards
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - CIS Controls
  - Compliance
  - CSF
  - Cybersecurity
  - FedRAMP
  - Frameworks
  - HIPAA
  - HITRUST
  - Information Security
  - ISO 27001
  - ISO 27002
  - NIST
  - NIST 800-171
  - NIST 800-218
  - NIST 800-53
  - OSCAL
  - OWASP
  - PCI DSS
  - Risk Management
  - SOC 2
  - SSDF
  - Standards
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Cybersecurity Standards API surface. Captures
  per-tier quotas, burst behavior, response signaling, and recovery semantics. Defaults are scaffold values
  to be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - NIST Cybersecurity Framework (CSF) 2.0
      - NIST SP 800-53 Security and Privacy Controls
      - NIST SP 800-171 Protecting CUI
      - NIST SP 800-218 Secure Software Development Framework (SSDF)
      - ISO/IEC 27001 Information Security Management
      - CIS Critical Security Controls and Benchmarks
      - OWASP Top 10 and ASVS
      - PCI DSS Payment Card Industry Data Security Standard
      - SOC 2 Trust Services Criteria
      - FedRAMP Federal Cloud Authorization
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - NIST Cybersecurity Framework (CSF) 2.0
      - NIST SP 800-53 Security and Privacy Controls
      - NIST SP 800-171 Protecting CUI
      - NIST SP 800-218 Secure Software Development Framework (SSDF)
      - ISO/IEC 27001 Information Security Management
      - CIS Critical Security Controls and Benchmarks
      - OWASP Top 10 and ASVS
      - PCI DSS Payment Card Industry Data Security Standard
      - SOC 2 Trust Services Criteria
      - FedRAMP Federal Cloud Authorization
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - NIST Cybersecurity Framework (CSF) 2.0
      - NIST SP 800-53 Security and Privacy Controls
      - NIST SP 800-171 Protecting CUI
      - NIST SP 800-218 Secure Software Development Framework (SSDF)
      - ISO/IEC 27001 Information Security Management
      - CIS Critical Security Controls and Benchmarks
      - OWASP Top 10 and ASVS
      - PCI DSS Payment Card Industry Data Security Standard
      - SOC 2 Trust Services Criteria
      - FedRAMP Federal Cloud Authorization
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - NIST Cybersecurity Framework (CSF) 2.0
      - NIST SP 800-53 Security and Privacy Controls
      - NIST SP 800-171 Protecting CUI
      - NIST SP 800-218 Secure Software Development Framework (SSDF)
      - ISO/IEC 27001 Information Security Management
      - CIS Critical Security Controls and Benchmarks
      - OWASP Top 10 and ASVS
      - PCI DSS Payment Card Industry Data Security Standard
      - SOC 2 Trust Services Criteria
      - FedRAMP Federal Cloud Authorization
  - tier: enterprise
    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - NIST Cybersecurity Framework (CSF) 2.0
      - NIST SP 800-53 Security and Privacy Controls
      - NIST SP 800-171 Protecting CUI
      - NIST SP 800-218 Secure Software Development Framework (SSDF)
      - ISO/IEC 27001 Information Security Management
      - CIS Critical Security Controls and Benchmarks
      - OWASP Top 10 and ASVS
      - PCI DSS Payment Card Industry Data Security Standard
      - SOC 2 Trust Services Criteria
      - FedRAMP Federal Cloud Authorization
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring the Retry-After header
      when present.
  - name: Burst Handling
    description: Short bursts above the steady-state limit are tolerated up to the documented burst ceiling
      before throttling engages.
  - name: Quota Reset
    description: Monthly quotas reset at the start of each calendar month in UTC. Per-minute and per-second
      windows reset on a sliding-window basis.
  - name: Fair Use
    description: Even on uncapped enterprise tiers, sustained usage that materially impacts shared infrastructure
      may be subject to fair-use throttling.
maintainers:
